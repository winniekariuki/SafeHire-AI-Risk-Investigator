# Local stack: backend (FastAPI) + frontend (Next.js standalone).
#
# API routes are mounted under ``/api`` so CloudFront can send ``/api/*`` to this service unchanged.
# Browser / Next.js: set NEXT_PUBLIC_API_URL=https://<cloudfront>/api or http://localhost:8000/api

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-safehire-api}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
      # Comma-separated; omit for *. Production: https://d111111abcdef8.cloudfront.net,https://yourdomain.com
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      - chroma_data:/app/app/rag/.chroma
      - embedding_models:/app/app/rag/.embedding_models
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    restart: unless-stopped

volumes:
  chroma_data:
  embedding_models:
